<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雨中行走物理模拟器</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
            overflow: hidden;
        }
        .header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h1 { margin: 0; font-size: 1.5rem; }
        .dashboard {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background-color: #ecf0f1;
            border-bottom: 2px solid #bdc3c7;
        }
        .stat-box {
            text-align: center;
            flex: 1;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2980b9;
        }
        .stat-label {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-top: 5px;
        }
        canvas {
            display: block;
            width: 100%;
            height: 250px;
            background-color: #d1e2ec;
            border-bottom: 2px solid #bdc3c7;
        }
        .controls {
            padding: 20px 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
        }
        .control-group label {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        .control-group input[type="range"] {
            width: 100%;
        }
        .control-group select {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        .val-display {
            font-weight: normal;
            color: #e74c3c;
            float: right;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🚶‍♂️ 雨中行走物理模拟器 🌧️</h1>
    </div>

    <div class="dashboard">
        <div class="stat-box">
            <div class="stat-value" id="val-time">0.0</div>
            <div class="stat-label">暴露时间 (秒)</div>
        </div>
        <div class="stat-box">
            <div class="stat-value" id="val-top">0.0</div>
            <div class="stat-label">头顶淋雨量 (滴)</div>
        </div>
        <div class="stat-box">
            <div class="stat-value" id="val-front">0.0</div>
            <div class="stat-label">前后淋雨量 (滴)</div>
        </div>
        <div class="stat-box">
            <div class="stat-value" style="color:#c0392b" id="val-total">0.0</div>
            <div class="stat-label">总淋雨量 (滴)</div>
        </div>
    </div>

    <canvas id="simCanvas"></canvas>

    <div class="controls">
        <div class="control-group">
            <label>人的速度 <span class="val-display" id="disp-vp">2.0 m/s</span></label>
            <input type="range" id="vp" min="0.5" max="8.0" step="0.5" value="2.0">
        </div>
        <div class="control-group">
            <label>风速 (负为迎面, 正为背后) <span class="val-display" id="disp-vw">0 m/s</span></label>
            <input type="range" id="vw" min="-5.0" max="5.0" step="0.5" value="0">
        </div>
        <div class="control-group">
            <label>雨滴垂直下落速度 <span class="val-display" id="disp-vr">5.0 m/s</span></label>
            <input type="range" id="vr" min="2.0" max="10.0" step="0.5" value="5.0">
        </div>
        <div class="control-group">
            <label>降雨强度 (密集度)</label>
            <select id="rho">
                <option value="1">小雨</option>
                <option value="3" selected>中雨</option>
                <option value="6">大雨</option>
            </select>
        </div>
    </div>
</div>

<script>
    // 物理常量与参数获取
    const D = 100; // 总距离100米
    const At = 0.1; // 头顶面积
    const Af = 0.6; // 身体前后面积

    const inputs = {
        vp: document.getElementById('vp'),
        vw: document.getElementById('vw'),
        vr: document.getElementById('vr'),
        rho: document.getElementById('rho')
    };

    const displays = {
        vp: document.getElementById('disp-vp'),
        vw: document.getElementById('disp-vw'),
        vr: document.getElementById('disp-vr'),
        time: document.getElementById('val-time'),
        top: document.getElementById('val-top'),
        front: document.getElementById('val-front'),
        total: document.getElementById('val-total')
    };

    let params = {};

    // 更新数学计算逻辑
    function updateCalculations() {
        params = {
            vp: parseFloat(inputs.vp.value),
            vw: parseFloat(inputs.vw.value),
            vr: parseFloat(inputs.vr.value),
            rho: parseFloat(inputs.rho.value)
        };

        displays.vp.innerText = params.vp.toFixed(1) + ' m/s';
        displays.vw.innerText = params.vw.toFixed(1) + ' m/s';
        displays.vr.innerText = params.vr.toFixed(1) + ' m/s';

        // 核心数学模型
        let time = D / params.vp;
        let rTop = params.rho * At * params.vr * time;
        let rFront = params.rho * Af * Math.abs(params.vp - params.vw) * time;
        let rTotal = rTop + rFront;

        displays.time.innerText = time.toFixed(1);
        displays.top.innerText = Math.round(rTop);
        displays.front.innerText = Math.round(rFront);
        displays.total.innerText = Math.round(rTotal);
    }

    // --- Canvas 动画逻辑 ---
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.parentElement.clientWidth; // 响应式宽度

    let personX = 0;
    let particles = [];

    class RainDrop {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * -canvas.height;
            this.hit = false;
        }
        update(vw, vr, px, py, pw, ph) {
            // 雨滴基于风速和重力移动（画布坐标系放大像素速度）
            this.x += vw * 1.5; 
            this.y += vr * 1.5;

            // 简单的矩形碰撞检测
            if (!this.hit && 
                this.x > px && this.x < px + pw && 
                this.y > py && this.y < py + ph) {
                this.hit = true;
            }

            // 循环雨滴
            if (this.y > canvas.height) {
                this.y = -20;
                this.x = Math.random() * canvas.width;
                this.hit = false;
            }
            if (this.x > canvas.width) this.x = 0;
            if (this.x < 0) this.x = canvas.width;
        }
        draw(ctx) {
            ctx.beginPath();
            if (this.hit) {
                ctx.fillStyle = '#e74c3c'; // 淋到的变红
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.strokeStyle = '#3498db'; // 没淋到的蓝色线
                ctx.lineWidth = 1;
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - params.vw * 0.5, this.y - params.vr * 0.5);
                ctx.stroke();
            }
        }
    }

    function maintainParticles() {
        const targetCount = params.rho * 150; // 根据降雨强度决定雨滴数量
        while (particles.length < targetCount) particles.push(new RainDrop());
        while (particles.length > targetCount) particles.pop();
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 人物参数
        const pWidth = 20;
        const pHeight = 50;
        const pY = canvas.height - pHeight - 10; // 地面上方
        
        // 人物移动
        personX += params.vp * 0.5;
        if (personX > canvas.width) {
            personX = -pWidth; // 走出屏幕后重置
            particles.forEach(p => p.hit = false); // 重置雨滴状态
        }

        // 绘制生动人物造型
        const cx = personX + pWidth / 2;
        
        // 头部
        ctx.fillStyle = '#fcd5ce';
        ctx.beginPath();
        ctx.arc(cx, pY + 7, 7, 0, Math.PI * 2);
        ctx.fill();
        
        // 头发
        ctx.fillStyle = '#4a4a4a';
        ctx.beginPath();
        ctx.arc(cx, pY + 5, 7, Math.PI, Math.PI * 2);
        ctx.fill();
        
        // 上衣
        ctx.fillStyle = '#3498db';
        ctx.fillRect(personX + 2, pY + 14, pWidth - 4, 18);
        
        // 手臂摆动动画
        const armSwing = Math.sin(personX * 0.15) * 3;
        ctx.fillRect(personX - 3, pY + 16 + armSwing, 4, 14);
        ctx.fillRect(personX + pWidth - 1, pY + 16 - armSwing, 4, 14);
        
        // 裤子
        ctx.fillStyle = '#2c3e50';
        ctx.fillRect(personX + 4, pY + 32, pWidth - 8, 10);
        
        // 走路腿部动画
        const walkPhase = Math.sin(personX * 0.2);
        ctx.fillRect(personX + 4, pY + 42, 5, 8 + walkPhase * 3);
        ctx.fillRect(personX + pWidth - 9, pY + 42, 5, 8 - walkPhase * 3);

        // 绘制地面
        ctx.fillStyle = '#95a5a6';
        ctx.fillRect(0, canvas.height - 10, canvas.width, 10);

        // 更新和绘制雨滴
        maintainParticles();
        particles.forEach(p => {
            p.update(params.vw, params.vr, personX, pY, pWidth, pHeight);
            p.draw(ctx);
        });

        requestAnimationFrame(animate);
    }

    // 绑定事件监听器
    Object.values(inputs).forEach(input => {
        input.addEventListener('input', updateCalculations);
    });

    // 初始化
    updateCalculations();
    animate();

    // 窗口大小调整时更新画布
    window.addEventListener('resize', () => {
        canvas.width = canvas.parentElement.clientWidth;
    });

</script>
</body>
</html>
